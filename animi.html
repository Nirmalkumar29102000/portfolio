<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wings{
            width: 300px;
            height: 200px;
           position: relative;
        }
        .wing{
            width: 120px;
            height: 200px;
            background-color: black;
            border-radius: 100% 0 100% 0;
            position: absolute;
            top: 0;
            box-shadow: 0 0 20px blue;
            animation: flip 1.5s ease-in-out infinite;
        }
        .left{
            left: 0;
            /* transform: rotate(-20deg); */
            animation: flip 1.5s ease-in-out infinite;
        }
        .right{
            right: 0;
            /* transform: rotate(20deg)scale(-1); */
            animation: flip1 1.5s ease-in-out infinite;
        }
        @keyframes flip{
            0%{
                transform: rotatey(0deg);
            }
            50%{
                transform: rotatey(305deg);
            }
            100%{
                transform: rotatey(0deg);
            }
        }
        @keyframes flip1{
            0%{
                transform: rotatez(0deg);
            }
            50%{
                transform: rotatez(305deg);
            }
            100%{
                transform: rotatez(0deg);
            }
        }
    </style>
</head>
<body>
    <div class="wings">
        <div class="wing left"></div>
        <div class="wing right"></div>
    </div>
</body>
</html>
